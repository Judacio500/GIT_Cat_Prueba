<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>El Gato del Multiverso Git</title>
    <style>
        body { display: flex; justify-content: center; align-items: center; height: 100vh; background-color: #f0f0f0; font-family: sans-serif; }
        .escena { text-align: center; }
        
        /* === EL GATO (Cuerpo y Colores Base) === */
        .gato {
            position: relative;
            width: 200px;
            height: 180px;
            /* CAMBIA ESTE COLOR PARA CREAR UNA VARIANTE */
            background-color: #95a5a6; /* Gris Base */
            border-radius: 100px 100px 60px 60px;
            margin-top: 50px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.1);
            transition: background-color 0.3s ease;
        }

        /* Orejas */
        .oreja {
            position: absolute;
            top: -30px;
            width: 0;
            height: 0;
            border-left: 35px solid transparent;
            border-right: 35px solid transparent;
            /* ESTE COLOR DEBE COINCIDIR CON EL CUERPO */
            border-bottom: 60px solid #95a5a6; /* Gris Base */
        }
        .oreja.izquierda { left: 20px; transform: rotate(-15deg); }
        .oreja.derecha { right: 20px; transform: rotate(15deg); }

        /* Ojos */
        .ojo {
            position: absolute;
            top: 60px;
            width: 30px;
            height: 30px;
            background-color: white;
            border-radius: 50%;
        }
        .ojo::after {
            content: '';
            position: absolute;
            top: 5px; left: 10px;
            width: 10px; height: 20px;
            background-color: #2c3e50; /* Pupila */
            border-radius: 50%;
        }
        .ojo.izquierda { left: 45px; }
        .ojo.derecha { right: 45px; }

        /* Nariz y Bigotes */
        .nariz {
            position: absolute;
            top: 100px; left: 92px;
            width: 16px; height: 10px;
            background-color: #e74c3c; /* Rosa */
            border-radius: 50%;
        }
        .bigotes {
            position: absolute;
            top: 110px; left: 50px;
            width: 100px; height: 40px;
            background-color: transparent;
        }
        .bigotes::before, .bigotes::after {
            content: '';
            position: absolute;
            width: 60px; height: 2px;
            background-color: #34495e;
        }
        .bigotes::before { top: 10px; left: -10px; transform: rotate(5deg); box-shadow: 0 10px 0 #34495e; }
        .bigotes::after { top: 10px; right: -10px; transform: rotate(-5deg); box-shadow: 0 10px 0 #34495e; }

    </style>
</head>
<body>
    <div class="escena">
        <h1>MIAU!!!!</h1>
        <div class="gato">
            <div class="oreja izquierda"></div>
            <div class="oreja derecha"></div>
            <div class="ojo izquierda"></div>
            <div class="ojo derecha"></div>
            <div class="nariz"></div>
            <div class="bigotes"></div>
        </div>
    </div>
</body>
</html>
